name: Build KSO Turbo
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt pillow
    - name: FFmpeg
      run: curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o f.zip && 7z x f.zip && move ffmpeg-*\bin\ffmpeg.exe.
    - name: Build
      run: pyinstaller --noconfirm --onefile --windowed --icon=app_icon.png --name "KSO Turbo" --add-data "lang.json;." --add-data "config.json;." --add-data "ffmpeg.exe;." --add-data "modules;modules" --hidden-import=keyboard --hidden-import=cryptography --hidden-import=psutil --hidden-import=plyer --collect-all yt_dlp --collect-all PyQt6 main.py
    - name: Portable
      run: powershell Compress-Archive "dist\KSO Turbo.exe",ffmpeg.exe,lang.json,config.json,modules "KSO-Portable.zip"
    - name: Installer
      shell: cmd
      run: |
        echo [Setup] > s.iss
        echo AppName=KSO Turbo >> s.iss
        echo AppVersion=1.0 >> s.iss
        echo DefaultDirName={pf}\KSO Turbo >> s.iss
        echo OutputBaseFilename=KSO-Setup >> s.iss
        echo SetupIconFile=app_icon.png >> s.iss
        echo [Files] >> s.iss
        echo Source: "dist\KSO Turbo.exe"; DestDir: "{app}" >> s.iss
        echo Source: "ffmpeg.exe"; DestDir: "{app}" >> s.iss
        echo Source: "lang.json"; DestDir: "{app}" >> s.iss
        echo Source: "config.json"; DestDir: "{app}" >> s.iss
        echo Source: "modules\*"; DestDir: "{app}\modules"; Flags: recursesubdirs >> s.iss
        echo [Icons] >> s.iss
        echo Name: "{autodesktop}\KSO Turbo"; Filename: "{app}\KSO Turbo.exe" >> s.iss
    - name: Compile
      run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" s.iss'
    - uses: actions/upload-artifact@v4
      with:
        name: KSO-Turbo
        path:
        - KSO-Portable.zip
        - KSO-Setup.exe

name: Build KSO Download Turbo Ultra

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka
    
    - name: Install Dependency Walker for Nuitka
      run: |
        choco install dependencywalker -y
    
    - name: Build with Nuitka
      run: |
        python -m nuitka `
        --mode=standalone `
        --enable-plugin=pyqt6 `
        --include-data-files=lang.json=lang.json `
        --include-data-files=config.json=config.json `
        --include-data-files=ffmpeg.exe=ffmpeg.exe `
        --include-package=modules `
        --include-package=speedtest_cli `
        --windows-icon-from-ico=app_icon.ico `
        --windows-console-mode=disable `
        --output-filename="KSO Download Turbo Ultra V1.0 PRO.exe" `
        main.py
      shell: powershell
    
    - name: Build Installer with NSIS
      run: |
        choco install nsis -y
        echo '!include "MUI2.nsh"' > installer.nsi
        echo 'Name "KSO Download Turbo Ultra V1.0 PRO"' >> installer.nsi
        echo 'OutFile "KSO-Setup.exe"' >> installer.nsi
        echo 'InstallDir "$PROGRAMFILES\KSO Download Turbo"' >> installer.nsi
        echo 'Page directory' >> installer.nsi
        echo 'Page instfiles' >> installer.nsi
        echo 'Section' >> installer.nsi
        echo '  SetOutPath $INSTDIR' >> installer.nsi
        echo '  File "KSO Download Turbo Ultra V1.0 PRO.exe"' >> installer.nsi
        echo '  CreateShortcut "$DESKTOP\KSO Download Turbo.lnk" "$INSTDIR\KSO Download Turbo Ultra V1.0 PRO.exe"' >> installer.nsi
        echo 'SectionEnd' >> installer.nsi
        & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
    
    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Portable
        path: KSO Download Turbo Ultra V1.0 PRO.exe
    
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Installer
        path: KSO-Setup.exe

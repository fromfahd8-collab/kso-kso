name: Build KSO Download Turbo Ultra v1 PRO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yt-dlp psutil plyer pyinstaller pillow

    - name: Download FFmpeg
      run: |
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg
        Move-Item ffmpeg/ffmpeg-*-essentials_build/bin/ffmpeg.exe .

    - name: Convert PNG to ICO
      shell: powershell
      run: |
        # بنحول icon.png ل icon.ico عشان PyInstaller
        python -c "from PIL import Image; img = Image.open('icon.png'); img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"
        dir icon.ico

    - name: Create required files
      shell: powershell
      run: |
        @'
        {
          "ar": {
            "title": "KSO Download Turbo Ultra",
            "speed": "السرعه",
            "path": "مسار الحفظ",
            "quality": "الجوده",
            "download": "تحميل",
            "pause": "ايقاف",
            "compress": "ضغط الفيديو",
            "connections": "عدد الاتصالات",
            "beast_mode": "Beast: 1,000,000"
          }
        }
        '@ | Set-Content -Path lang.json -Encoding UTF8

        @'
        {
          "download_path": "Downloads",
          "max_connections": 8,
          "theme": "dark",
          "language": "ar"
        }
        '@ | Set-Content -Path config.json -Encoding UTF8

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --add-data "lang.json;." --add-data "config.json;." --add-data "ffmpeg.exe;." --hidden-import="yt_dlp" --hidden-import="PyQt6" main.py
        Move-Item dist/main.exe dist/KSO_Download_Turbo_Ultra.exe

    - name: Test 1 - Launch
      run: |
        Start-Process -FilePath "dist/KSO_Download_Turbo_Ultra.exe" -PassThru
        Start-Sleep -Seconds 5
        taskkill /f /im KSO_Download_Turbo_Ultra.exe

    - name: Test 2 - File Size
      run: |
        $size = (Get-Item dist/KSO_Download_Turbo_Ultra.exe).Length / 1MB
        Write-Host "EXE Size: $size MB"

    - name: Create Portable ZIP with FFmpeg
      run: |
        Compress-Archive -Path dist/KSO_Download_Turbo_Ultra.exe, ffmpeg.exe, lang.json, config.json -DestinationPath KSO_Portable.zip

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-Windows
        path: |
          dist/KSO_Download_Turbo_Ultra.exe
          KSO_Portable.zip

name: Build KSO with Nuitka

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Download FFmpeg
      run: |
        Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg
        Copy-Item (Get-ChildItem -Path ffmpeg -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName -Destination ffmpeg.exe

    - name: Create setup.iss file
      run: |
        @'
        [Setup]
        AppName=KSO Download Turbo Ultra
        AppVersion=1.0
        DefaultDirName={pf}\KSO Download Turbo Ultra
        OutputDir=Output
        OutputBaseFilename=KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        Compression=lzma2
        SolidCompression=yes
        WizardStyle=modern

        [Files]
        Source: "KSO Download Turbo Ultra V1.0 PRO.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "lang.json"; DestDir: "{app}"; Flags: ignoreversion
        Source: "config.json"; DestDir: "{app}"; Flags: ignoreversion
        Source: "ffmpeg.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "main.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "compressor.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "downloader.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "modules\*"; DestDir: "{app}\modules"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\KSO Download Turbo Ultra"; Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"
        Name: "{commondesktop}\KSO Download Turbo Ultra"; Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"

        [Run]
        Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"; Description: "Launch Application"; Flags: nowait postinstall skipifsilent
        '@ | Out-File -FilePath setup.iss -Encoding UTF8

    - name: Build with Nuitka
      run: |
        python -m nuitka --onefile --windows-disable-console --windows-icon-from-ico=app_icon.ico --enable-plugin=pyqt6 --include-data-files=lang.json=lang.json --include-data-files=config.json=config.json --include-data-files=ffmpeg.exe=ffmpeg.exe --include-package=modules --include-package=speedtest_cli --output-filename="KSO Download Turbo Ultra V1.0 PRO.exe" main.py

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Portable
        path: KSO Download Turbo Ultra V1.0 PRO.exe

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        path: Output/*.exe

name: Build KSO Download Turbo Ultra V1 PRO FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install UPX
      run: choco install upx -y

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6 PyQt6-WebEngine PyQt6-Qt6
        pip install yt-dlp keyboard plyer psutil cryptography speedtest-cli pillow

    - name: Download FFmpeg
      run: |
        curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
        7z x ffmpeg.zip -offmpeg
        move ffmpeg\ffmpeg-*-essentials\bin\ffmpeg.exe.

    - name: Create required files
      run: |
        echo {"ar": {"title": "KSO Download Turbo Ultra", "speed": "السرعه", "path": "مسار الحفظ", "quality": "الجوده", "download": "تحميل", "pause": "ايقاف", "compress": "ضغط الفيديو"}} > lang.json
        echo {"download_path": "downloads", "max_speed": 0, "max_connections": 8, "video_compression": true, "compression_quality": 23} > config.json
        if not exist downloads mkdir downloads

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "KSO_Download_Turbo_Ultra_v1" `
        --icon="icon.png" `
        --add-data "icon.png;." `
        --add-data "lang.json;." `
        --add-data "config.json;." `
        --add-data "ffmpeg.exe;." `
        --collect-all PyQt6 `
        --collect-all PyQt6.QtWebEngineWidgets `
        --collect-all yt_dlp `
        --upx-dir="C:\ProgramData\chocolatey\bin" `
        main.py

    - name: Test 1 - Launch
      run: |
        cd dist
        Start-Process.\KSO_Download_Turbo_Ultra_v1.exe
        timeout 30
        tasklist | findstr KSO_Download_Turbo_Ultra_v1.exe
        if %errorlevel% neq 0 exit 1
        taskkill /F /IM KSO_Download_Turbo_Ultra_v1.exe
      timeout-minutes: 2

    - name: Test 2 - File Size
      run: |
        cd dist
        $size = (Get-Item KSO_Download_Turbo_Ultra_v1.exe).length / 1MB
        echo "EXE Size: $size MB"
        if ($size -lt 50) { exit 1 }
      shell: powershell

    - name: Create Portable ZIP with FFmpeg
      run: |
        cd dist
        copy..\ffmpeg.exe.
        7z a -tzip..\KSO_Download_Turbo_Ultra_v1_Portable.zip *

    - name: Create Installer with Inno Setup + FFmpeg
      run: |
        choco install innosetup -y
        echo [Setup] > setup.iss
        echo AppName=KSO Download Turbo Ultra v1 PRO >> setup.iss
        echo AppVersion=1.0 >> setup.iss
        echo DefaultDirName={autopf}\KSO Download Turbo Ultra >> setup.iss
        echo OutputDir=. >> setup.iss
        echo OutputBaseFilename=KSO_Download_Turbo_Ultra_v1_Setup >> setup.iss
        echo Compression=lzma2 >> setup.iss
        echo [Files] >> setup.iss
        echo Source: "dist\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs >> setup.iss
        echo Source: "ffmpeg.exe"; DestDir: "{app}"; Flags: ignoreversion >> setup.iss
        echo [Icons] >> setup.iss
        echo Name: "{group}\KSO Download Turbo Ultra"; Filename: "{app}\KSO_Download_Turbo_Ultra_v1.exe" >> setup.iss
        echo [Run] >> setup.iss
        echo Filename: "{app}\KSO_Download_Turbo_Ultra_v1.exe"; Description: "Launch Application"; Flags: postinstall skipifsilent >> setup.iss
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-v1-PRO-FINAL
        path: |
          KSO_Download_Turbo_Ultra_v1_Portable.zip
          KSO_Download_Turbo_Ultra_v1_Setup.exe

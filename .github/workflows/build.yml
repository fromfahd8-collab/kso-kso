name: Build KSO Download Turbo Ultra

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build Portable EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.png --name "KSO Download Turbo Ultra V1.0 PRO" --add-data "lang.json;." --add-data "config.json;." --add-data "ffmpeg.exe;." --add-data "modules;modules" --hidden-import=keyboard --hidden-import=cryptography --hidden-import=psutil --hidden-import=plyer --collect-all yt_dlp --collect-all PyQt6 main.py

    - name: Build Installer
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Portable
        path: dist/KSO Download Turbo Ultra V1.0 PRO.exe

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        path: Output/KSO Download Turbo Ultra V1.0 PRO Setup.exe

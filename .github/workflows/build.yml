name: Build KSO Download Turbo Ultra

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Fix _init_
      run: |
        if (Test-Path "modules/_init_.py") { Rename-Item "modules/_init_.py" "__init__.py" }
    
    - name: Create fixed main.py
      run: |
        @'
        import sys
        from PyQt6.QtWidgets import QApplication
        from PyQt6.QtWebEngineCore import QWebEngineDownloadRequest  # ده التعديل المهم
        from main_app import MainWindow  # غيرها باسم الكلاس بتاعك

        if __name__ == "__main__":
            app = QApplication(sys.argv)
            window = MainWindow()
            window.show()
            sys.exit(app.exec())
        '@ | Out-File -FilePath main.py -Encoding UTF8

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps with FIXED versions
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-WebEngine==6.6.1  # ثبتنا الاصدار
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Download FFmpeg
      run: |
        Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg
        Copy-Item ffmpeg/ffmpeg-*/bin/ffmpeg.exe .
    
    - name: Install Inno Setup
      run: choco install innosetup -y
    
    - name: Build Portable EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.ico --name "KSO Download Turbo Ultra V1.0 PRO" --add-data "lang.json;." --add-data "config.json;." --add-data "ffmpeg.exe;." --add-data "modules;modules" --hidden-import=keyboard --hidden-import=cryptography --hidden-import=psutil --hidden-import=plyer --collect-all yt_dlp --collect-all PyQt6 main.py
    
    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
    
    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Portable
        path: dist/*.exe
    
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        path: Output/*.exe

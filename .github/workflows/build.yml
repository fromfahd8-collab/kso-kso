name: Build KSO Download Turbo Ultra

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fix _init_ to __init__
      run: |
        if (Test-Path "modules/_init_.py") { Rename-Item "modules/_init_.py" "__init__.py" }
        if (Test-Path "modules/_init_.pyc") { Remove-Item "modules/_init_.pyc" }

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-WebEngine==6.6.1
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download FFmpeg
      run: |
        Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg
        $ffmpegPath = Get-ChildItem -Path ffmpeg -Recurse -Filter ffmpeg.exe | Select-Object -First 1
        Copy-Item $ffmpegPath.FullName -Destination ffmpeg.exe
        dir ffmpeg.exe

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Create setup.iss file
      run: |
        @'
        [Setup]
        AppName=KSO Download Turbo Ultra
        AppVersion=1.0
        DefaultDirName={pf}\KSO Download Turbo Ultra
        OutputDir=Output
        OutputBaseFilename=KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        Compression=lzma2
        SolidCompression=yes
        WizardStyle=modern

        [Files]
        Source: "dist\KSO Download Turbo Ultra V1.0 PRO.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "lang.json"; DestDir: "{app}"; Flags: ignoreversion
        Source: "config.json"; DestDir: "{app}"; Flags: ignoreversion
        Source: "ffmpeg.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "main.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "compressor.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "downloader.py"; DestDir: "{app}"; Flags: ignoreversion
        Source: "modules\*"; DestDir: "{app}\modules"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\KSO Download Turbo Ultra"; Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"
        Name: "{commondesktop}\KSO Download Turbo Ultra"; Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"

        [Run]
        Filename: "{app}\KSO Download Turbo Ultra V1.0 PRO.exe"; Description: "Launch Application"; Flags: nowait postinstall skipifsilent
        '@ | Out-File -FilePath setup.iss -Encoding UTF8

    - name: Build Portable EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.ico --name "KSO Download Turbo Ultra V1.0 PRO" --add-data "lang.json;." --add-data "config.json;." --add-data "ffmpeg.exe;." --add-data "main.py;." --add-data "compressor.py;." --add-data "downloader.py;." --add-data "modules;modules" --hidden-import=keyboard --hidden-import=cryptography --hidden-import=psutil --hidden-import=plyer --collect-all yt_dlp --collect-all PyQt6 main.py

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Portable
        path: dist/*.exe

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KSO-Download-Turbo-Ultra-V1.0-PRO-Setup
        path: Output/*.exe
